<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Infopedia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="mw-page-container">
    <header class="mw-header">
        <div class="logo-area">
            <img src="infopedia.png" alt="Infopedia" class="logo" id="homeLogo">
            <div class="logo-text"><span>Infopedia</span></div>
        </div>
        
        <div class="search-container">
            <div class="search-wrapper">
                <input type="text" id="searchInput" class="search-input" placeholder="Поиск в Infopedia" autocomplete="off">
                <button class="search-btn">🔍</button>
                <div id="searchResults" class="search-results"></div>
            </div>
        </div>
        
        <button class="mobile-toggle" id="sidebarToggle">☰ Меню</button>
    </header>

    <div class="mw-body-wrapper">
        <!-- БОКОВАЯ ПАНЕЛЬ (только главная страница) -->
        <aside class="mw-sidebar" id="sidebar">
            <div class="mw-sidebar-section">
                <h3>Навигация</h3>
                <ul>
                    <li><a href="index.html" id="mainPageLink">Заглавная страница</a></li>
                </ul>
            </div>
        </aside>

        <!-- ОСНОВНОЙ КОНТЕНТ (статья) -->
        <main class="mw-body-content">
            <h1 class="firstHeading">Главная страница</h1>
            <hr style="margin: 12px 0 20px; border-color: #eaecf0;">
            <h2>Инструменты</h2>
            <ul>
                <li><a href="world.html" id="mainPageLink">Карта</a></li>
            </ul>
        </main>
    </div>
</div>
<script src="search.js"></script>
<script src="script.js"></script>
</body>
</html>
